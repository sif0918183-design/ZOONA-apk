name: Build ZOONA APK

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get
        working-directory: pwa_to_flutter_app

      - name: Setup Firebase Android
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json
        working-directory: pwa_to_flutter_app

      - name: Generate App Icons
        run: flutter pub run flutter_launcher_icons || echo "Icons generation skipped"
        working-directory: pwa_to_flutter_app

      - name: Build APK
        run: flutter build apk --release
        working-directory: pwa_to_flutter_app

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZOONA-App-Release
          path: pwa_to_flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7