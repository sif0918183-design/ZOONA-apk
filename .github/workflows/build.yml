name: Build ZOONA APK

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get
        working-directory: pwa_to_flutter_app

      - name: Setup Firebase Android
        id: firebase-setup
        run: |
          if [ -z "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" ]; then
            echo "Warning: GOOGLE_SERVICES_JSON_BASE64 secret is missing!"
            echo "The build will be skipped because Firebase configuration is required for Android."
            echo "Please add your google-services.json content as a Base64-encoded secret to your repository."
            echo "secret_exists=false" >> $GITHUB_OUTPUT
          else
            echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json
            echo "secret_exists=true" >> $GITHUB_OUTPUT
          fi
        working-directory: pwa_to_flutter_app

      - name: Generate App Icons
        if: steps.firebase-setup.outputs.secret_exists == 'true'
        run: flutter pub run flutter_launcher_icons || echo "Icons generation skipped"
        working-directory: pwa_to_flutter_app

      - name: Build APK
        if: steps.firebase-setup.outputs.secret_exists == 'true'
        run: flutter build apk --release
        working-directory: pwa_to_flutter_app

      - name: Upload APK Artifact
        if: steps.firebase-setup.outputs.secret_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ZOONA-App-Release
          path: pwa_to_flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7