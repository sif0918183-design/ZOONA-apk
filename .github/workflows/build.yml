name: Build ZOONA APK & AAB

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get
        working-directory: pwa_to_flutter_app

      - name: Setup Firebase Android
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json
        working-directory: pwa_to_flutter_app

      - name: Generate App Icons
        run: flutter pub run flutter_launcher_icons || echo "Icons generation skipped"
        working-directory: pwa_to_flutter_app

      # =========================
      # 🔐 SIGNING SETUP
      # =========================
      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
        working-directory: pwa_to_flutter_app

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties
        working-directory: pwa_to_flutter_app

      # =========================
      # 📦 BUILD APK
      # =========================
      - name: Build APK
        run: flutter build apk --release
        working-directory: pwa_to_flutter_app

      # =========================
      # 📦 BUILD AAB
      # =========================
      - name: Build AAB
        run: flutter build appbundle --release
        working-directory: pwa_to_flutter_app

      # =========================
      # 📤 UPLOAD ARTIFACTS
      # =========================
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZOONA-APK-Release
          path: pwa_to_flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZOONA-AAB-Release
          path: pwa_to_flutter_app/build/app/outputs/bundle/release/app-release.aab
          retention-days: 7