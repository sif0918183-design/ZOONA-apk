plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace "com.pichillilorenzo.pwa_to_flutter_app"
    compileSdk 35
    ndkVersion "26.1.10909125"

    compileOptions {
        // التصحيح هنا: حذف حرف "is" وحذف علامة "=" 
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        applicationId "com.pichillilorenzo.pwa_to_flutter_app"
        // رفع الـ minSdk ضروري لبعض ميزات الخلفية الحديثة
        minSdk 23 
        targetSdk 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName

        multiDexEnabled true

        manifestPlaceholders = [
            onesignal_app_id: "c05c5d16-4e72-4d4a-b1a2-6e7e06232d98",
            onesignal_google_project_number: "REMOTE"
        ]
    }

    buildTypes {
        release {
            // تنبيه: تأكد من إضافة مفتاح التوقيع الحقيقي لاحقاً بدلاً من debug
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

dependencies {
    // تحديث إصدار المكتبة ليتوافق مع Android 15
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.2"
    
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'androidx.multidex:multidex:2.0.1'
}
