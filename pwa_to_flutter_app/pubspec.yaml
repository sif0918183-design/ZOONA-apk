name: tarhal_zoona_driver
description: تطبيق سائق ترحال زونا
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  supabase_flutter: ^2.1.3
  onesignal_flutter: ^3.6.3
  flutter_inappwebview: ^6.0.0-beta.10
  http: ^1.1.0
  url_launcher: ^6.1.14
  shared_preferences: ^2.2.2
  connectivity_plus: ^5.0.2
  permission_handler: ^11.0.1
  location: ^5.0.0
  dio: ^5.3.3
  firebase_messaging: ^14.7.5
  package_info_plus: ^5.0.1
  device_info_plus: ^9.0.3
  flutter_native_splash: ^2.3.7
  app_lifecycle: ^0.2.0
  intl: ^0.19.0
  cached_network_image: ^3.3.0
  pull_to_refresh: ^3.0.2
  lottie: ^2.7.0
  badges: ^3.1.1
  vibrate: ^1.4.0
  flutter_local_notifications: ^16.1.0
  workmanager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  supabase: ^1.10.14
  build_runner: ^2.4.7
  flutter_gen_runner: ^5.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
  
  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
        - asset: assets/fonts/Tajawal-ExtraBold.ttf
          weight: 800