import 'dart:convert';
import 'dart:io';

import 'package:flutter/material.dart';
import 'package:flutter_inappwebview/flutter_inappwebview.dart';
import 'package:onesignal_flutter/onesignal_flutter.dart';
import 'package:http/http.dart' as http;

Future<void> main() async {
  WidgetsFlutterBinding.ensureInitialized();

  await OneSignal.shared.setAppId(
    "c05c5d16-4e72-4d4a-b1a2-6e7e06232d98",
  );

  runApp(const MyApp());
}

class MyApp extends StatefulWidget {
  const MyApp({super.key});

  @override
  State<MyApp> createState() => _MyAppState();
}

class _MyAppState extends State<MyApp> {
  InAppWebViewController? webViewController;
  bool isLoading = true;

  @override
  Widget build(BuildContext context) {
    return MaterialApp(
      debugShowCheckedModeBanner: false,
      home: Scaffold(
        body: Stack(
          children: [
            InAppWebView(
              initialUrlRequest: URLRequest(
                url: WebUri("https://driver.zoonasd.com/"),
              ),
              onWebViewCreated: (controller) {
                webViewController = controller;
              },
              onLoadStop: (controller, url) async {
                setState(() => isLoading = false);

                await Future.delayed(const Duration(seconds: 2));
                await syncDriverWithPushToken(controller);
              },
            ),
            if (isLoading)
              const Center(child: CircularProgressIndicator()),
          ],
        ),
      ),
    );
  }

  Future<void> syncDriverWithPushToken(
      InAppWebViewController controller) async {
    try {
      // قراءة driver_id من PWA
      final driverId = await controller.evaluateJavascript(source: """
        localStorage.getItem('driver_id') ||
        localStorage.getItem('tarhal_driver_id');
      """);

      if (driverId == null || driverId.toString().length < 5) {
        debugPrint("⏳ driver_id not found");
        return;
      }

      // جلب push token
      final deviceState = await OneSignal.shared.getDeviceState();
      final pushToken = deviceState?.userId;

      if (pushToken == null) {
        debugPrint("❌ push token not found");
        return;
      }

      debugPrint("🚀 Sending token to API");

      await http.post(
        Uri.parse("https://YOURDOMAIN.com/api/save-token"),
        headers: {"Content-Type": "application/json"},
        body: jsonEncode({
          "driverId": driverId.toString(),
          "pushToken": pushToken,
        }),
      );

      debugPrint("✅ Token synced successfully");
    } catch (e) {
      debugPrint("Sync error: $e");
    }
  }
}