name: tarhal_zoona_driver
description: تطبيق سائق ترحال زونا
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # الخطوط
  google_fonts: 6.1.0

  # Supabase
  supabase_flutter: 2.1.3

  # WebView
  flutter_inappwebview: 6.0.0-beta.10

  # أدوات أساسية
  http: 1.1.0
  url_launcher: 6.1.14
  shared_preferences: 2.2.2
  connectivity_plus: 5.0.2
  permission_handler: 11.0.1
  location: 5.0.0
  dio: 5.3.3
  package_info_plus: 5.0.1
  device_info_plus: 9.0.3
  flutter_native_splash: 2.3.7
  intl: 0.19.0
  cached_network_image: 3.3.0
  lottie: 2.7.0
  badges: 3.1.1
  vibration: 1.9.0
  pull_to_refresh_flutter3: 2.0.2

  # الصوت (مهم جداً تثبيت الإصدار)
  audioplayers: 5.2.1
  audioplayers_web: 4.1.0

  # إدارة الخلفية
  workmanager: 0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 3.0.1
  build_runner: 2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/ride_request_sound.wav