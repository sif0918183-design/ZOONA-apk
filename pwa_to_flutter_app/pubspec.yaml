publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.8.4
  flutter_inappwebview: 6.0.0-beta.10
  audioplayers: 5.2.1
  audioplayers_web: 4.1.0
  vibration: 1.9.0
  flutter_local_notifications: 17.1.2
  shared_preferences: 2.2.2
  permission_handler: 11.0.1
  connectivity_plus: 5.0.2
