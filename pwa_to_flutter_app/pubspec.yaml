name: tarhal_zoona_driver
description: تطبيق سائق ترحال زونا
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  supabase_flutter: ^2.8.4
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  flutter_inappwebview: ^6.1.5
  audioplayers: ^5.2.1
  audioplayers_web: ^4.1.0
  vibration: ^1.9.0
  
  # هذا هو الإصدار الذي يحل مشكلة الـ SDK 35
  flutter_local_notifications: ^17.2.2
  
  shared_preferences: ^2.5.3
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.0
  
  # تم التصحيح هنا من 6.3.10 إلى 6.3.1
  url_launcher: ^6.3.1
  
  flutter_foreground_task: ^9.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

dependency_overrides:
  firebase_core_web: ^2.17.4

flutter:
  uses-material-design: true
  assets:
    - assets/ride_request_sound.mp3
