name: tarhal_zoona_driver
description: تطبيق سائق ترحال زونا
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # الخطوط والإشعارات
  google_fonts: ^6.1.0
  onesignal_flutter: ^3.5.1
  flutter_local_notifications: ^16.1.0

  # إدارة البيانات والويب
  supabase_flutter: ^2.1.3
  flutter_inappwebview: ^6.0.0-beta.10
  flutter_riverpod: ^2.4.9

  # الأدوات المساعدة
  http: ^1.1.0
  url_launcher: ^6.1.14
  shared_preferences: ^2.2.2
  connectivity_plus: ^5.0.2
  permission_handler: ^11.0.1
  location: ^5.0.0
  dio: ^5.3.3
  package_info_plus: ^5.0.1
  device_info_plus: ^9.0.3
  flutter_native_splash: ^2.3.7
  intl: ^0.19.0
  cached_network_image: ^3.3.0
  lottie: ^2.7.0
  badges: ^3.1.1
  vibration: ^1.9.0
  workmanager: ^0.5.1
  pull_to_refresh_flutter3: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/ # يجب وجود ملف الصوت هنا أيضاً لضمان نجاح الـ Build
